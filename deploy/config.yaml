# Secrets-FREE deploy config, baked into the container image as /app/config.yaml.
#
# Kalshi credentials are deliberately NOT here — they arrive as Fly secrets (env):
#   KALSHI_KEY_ID, KALSHI_PRIVATE_KEY, KALSHI_ENV  (env vars override this file).
# Alert channel arrives as the HEDGE_ALERT_URL secret.
#
# This file exists so the conservative risk envelope and kill-switch ALWAYS apply in
# the container. Without it, the bot would fall back to library defaults (λ=0.25, no
# absolute $ cap, no daily-loss stop) — which is how a one-cent market becomes a
# 7,500-contract order. The caps below are the agreed go-live envelope.

kalshi:
  env: demo            # overridden by the KALSHI_ENV secret at deploy time

risk:
  lambda_kelly: 0.10        # conservative fractional Kelly
  k_sigma: 2.0
  z_ci: 1.0
  tau_min_cents: 2
  market_cap_frac: 0.03
  portfolio_cap: 0.30
  event_cap_frac: 0.06      # cap total risk across all buckets of one city-day. They
                            # are correlated (one synoptic draw) — a biased center misses
                            # them together, the 2026-06-29 failure mode. Caps the cluster.
  participation_frac: 0.25  # take at most 25% of the size resting at our price per order,
                            # so a large Kelly target is shrunk, not walked through the book.
  # NB: structural settlement-basis uncertainty is applied in °F inside the predictive
  # distribution (calibration.settlement_sigma + bucket_prob_and_se), NOT here —
  # RiskConfig.sigma_model is in PROBABILITY units and is left at its 0.0 default.
  rebalance_band: 0.25
  min_price: 0.10           # don't open below 10c: tail bets, no exit liquidity
  max_price: 0.90           # rich-side mirror
  max_order_dollars: 25.0   # hard per-order ceiling
  daily_loss_stop_dollars: 15.0   # latch a halt for the UTC day past this loss.
                                   # Tightened from 50 now that the stop actually
                                   # SEES intraday-close losses (the fix) — 50 was
                                   # ~all of a ~$50 bankroll, i.e. no real protection.
  manage_positions: true    # intraday trim/add/flip-to-exit ENABLED. Blockers fixed:
                            # intraday-close P&L is booked to the daily stop, an anti-churn
                            # cooldown damps flip-flop, and the guard samples buys only.
                            # Price band keeps opens out of the tails.
  manage_cooldown_cycles: 2 # don't re-act on a managed ticker for 2 cycles (anti-churn)

# Per-strategy Kelly-λ multiplier (#3 "concentrate on the one real edge"). Morning
# forecast bets have no durable edge vs an efficient mid pulling the same free feeds —
# run them at ~0 size (paper/log only) and put size on the intraday obs-lag nowcast.
# Missing strategy => 1.0. Composes with the guard skill multiplier below.
strategy_lambda:
  weather_ensemble: 0.0     # all-day forecast workhorse — no edge vs mid, log only
  weather_blend: 0.0        # ensemble-then-nowcast; the nowcast carries size directly
  weather_nowcast: 1.0      # the intraday obs-lag edge — the only one that carries size

guard:
  enabled: true
  min_samples: 20
  max_brier: 0.25
  baseline_brier: 0.15      # binary acted-on Brier; trips at 0.20
  tolerance: 0.05
  window_days: 14
  flatten_on_trip: false
  # Market-relative skill gate (#3 step 4): scale λ by demonstrated OOS skill vs the
  # MARKET MID, not just calibration. Until the acted-on probabilities beat the mid's
  # Brier over skill_min_samples settled trades, size stays at skill_floor (a small
  # bootstrap so the high-confidence deterministic trades still place and accrue the
  # settled samples that let it ramp); it scales to full λ at skill_full_at of skill.
  # Prove the edge offline first: scripts/run_paper.py skill.
  skill_gate: true
  skill_min_samples: 30
  skill_full_at: 0.02
  skill_floor: 0.10

# Alerts are delivered via the HEDGE_ALERT_URL Fly secret (env).
# This section is mostly for local docs / reference. Multi-channel scaffold
# supported (comma in HEDGE_ALERT_URL or alerts.channels list).
alerts:
  enabled: true
