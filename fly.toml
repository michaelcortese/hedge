# fly.toml app configuration file generated for hedge-bot on 2026-06-29T10:47:28-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hedge-bot'
primary_region = 'iad'

[build]

[env]
  HEDGE_STATE_DIR = '/data'
  KALSHI_ENV = 'demo'

[[mounts]]
  source = 'data'
  destination = '/data'

# NO [http_service]/[[services]]: this is a trading WORKER, not a web server. With a
# service, Fly Proxy treats zero inbound traffic as "excess capacity" and autostops
# the machine (which then never autostarts, since no request ever arrives) — that is
# what killed the 24/7 loop. Removing it makes the app private and proxy-unmanaged.

# Keep the single worker alive across crashes and clean exits.
[[restart]]
  policy = 'always'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
