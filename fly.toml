# fly.toml app configuration file generated for hedge-bot on 2026-06-29T10:47:28-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hedge-bot'
primary_region = 'iad'

[build]

[env]
  HEDGE_STATE_DIR = '/data'
  KALSHI_ENV = 'demo'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[restart]]
  policy = 'always'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
