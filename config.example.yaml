# Copy to config.yaml and fill in. config.yaml is gitignored.
kalshi:
  # Which environment the bot uses. "demo" for paper trading / development;
  # "prod" for real money. Demo and prod keys are SEPARATE and not
  # interchangeable, so each environment has its own credentials below.
  env: demo

  environments:
    demo:
      base_url: https://demo-api.kalshi.co/trade-api/v2
      # API Key ID (UUID) from the Kalshi DEMO web UI.
      key_id: "4abb2271-1e6f-439f-8194-c798c328c455"
      # PEM that demo showed you once at key creation.
      private_key_path: secrets/kalshi_demo_private_key.pem
    prod:
      base_url: https://api.elections.kalshi.com/trade-api/v2
      # API Key ID (UUID) from the Kalshi PROD web UI.
      key_id: "REPLACE_PROD_KEY_ID"
      private_key_path: secrets/kalshi_prod_private_key.pem

  # Env vars override the active environment's values if set:
  #   KALSHI_KEY_ID, KALSHI_PRIVATE_KEY_PATH, KALSHI_BASE_URL

# Risk / sizing knobs (consumed by the decision engine, not yet wired).
risk:
  lambda_kelly: 0.25       # fraction of full Kelly (0.25-0.5 recommended)
  k_sigma: 2.0             # require |p - q| > k_sigma * sigma to trade
  z_ci: 1.0               # conservative-edge CI haircut on prob
  tau_min_cents: 2         # minimum net edge in cents to act
  market_cap_frac: 0.03    # max bankroll fraction per market
  portfolio_cap: 0.30      # max total at-risk fraction
  rebalance_band: 0.25     # only rebalance if target drifts > this fraction
  min_price: 0.10          # refuse to open below this price (tail bets, no exit liquidity)
  max_price: 0.90          # rich-side mirror of min_price
  max_order_dollars: 25.0  # HARD absolute ceiling on $-at-risk per order (early-live
                           # backstop; null = fractions only). Raise as P&L is proven.
  event_cap_frac: 0.06     # max bankroll fraction at risk across ALL buckets of one
                           # city-day (they are correlated; caps the cluster)
  participation_frac: 0.25 # take at most this fraction of resting depth per order (book)

# Per-strategy Kelly-λ multiplier (#3). Run the no-edge morning forecast strategies at
# ~0 size (paper/log only) and put size on the intraday obs-lag nowcast. Omit a strategy
# (or the whole section) to leave it at full λ. Composes with the guard skill gate.
strategy_lambda:
  weather_ensemble: 0.0
  weather_blend: 0.0
  weather_nowcast: 1.0

# Model-failure kill-switch: halt trading if realized calibration (Brier score of
# acted-on probabilities vs settled outcomes) drifts badly. Tripping is a latch —
# clear it with `run_live.py --reset-guard` after you've diagnosed the model.
guard:
  enabled: true
  min_samples: 20          # settled trades required before it can trip
  max_brier: 0.25          # absolute ceiling (>0.25 = worse than a coin) backstop
  # baseline_brier is the BINARY Brier of the acted-on P(YES) vs outcome
  # (mean((p_yes - outcome)^2)), 0.25 = coin. This is NOT the backtest leaderboard's
  # multi-bucket Brier — different metric, different scale. Set a tight arming value
  # and refine it from forward acted-on settlements (run_paper score) once you have a
  # few dozen. 0.15 + 0.05 tolerance trips at 0.20 (model drifting toward a coin).
  baseline_brier: 0.15
  tolerance: 0.05          # allowed drift above baseline_brier (threshold = sum)
  window_days: 14          # how far back to read settled decisions
  flatten_on_trip: false   # also sell out of open positions when tripped
  # Market-relative skill gate (#3 step 4): scale λ by demonstrated OOS skill vs the
  # MARKET MID (does the model beat the price, not just calibration?). OFF by default;
  # when on, size stays at skill_floor until acted-on probs beat the mid's Brier over
  # skill_min_samples settled trades, ramping to full λ at skill_full_at of skill.
  # Prove it offline first: scripts/run_paper.py skill.
  skill_gate: false
  skill_min_samples: 30
  skill_full_at: 0.02      # Brier-skill margin (market - model) for full size
  skill_floor: 0.10        # λ multiplier before skill is proven (small bootstrap)

# Push notifications (ntfy, Slack, Pushover, Telegram, generic webhooks).
# Best-effort; never blocks trading. Legacy HEDGE_ALERT_URL still works.
# For multiple channels use the "channels" list (or comma-sep in url).
alerts:
  enabled: true
  # Simple single-channel (or "url1,url2" for quick multi):
  # url: https://ntfy.sh/your-hedge-topic-here
  #
  # Recommended for richer setups:
  # channels:
  #   - https://ntfy.sh/your-hedge-topic-here
  #   - type: slack
  #     url: https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXXXXXX
  #   - type: pushover
  #     token: your-app-token
  #     user: your-user-key
  #   - type: telegram
  #     bot_token: 123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11
  #     chat_id: "123456789"
